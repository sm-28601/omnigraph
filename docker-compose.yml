services:
  postgres:
    image: postgres:16
    container_name: omnigraph-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-omnigraph}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-omnigraph}
      POSTGRES_DB: ${POSTGRES_DB:-omnigraph}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
  neo4j:
    image: neo4j:5.26
    container_name: omnigraph-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-omnigraph123}
      NEO4J_PLUGINS: '["apoc","graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_security_procedures_allowlist: apoc.*
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - ./data/processed:/import:ro
      - ./backend/graph:/graph:ro

volumes:
  postgres_data:
  neo4j_data:
